[package]
name = "nox-wasm"
version = "0.1.0"
edition = "2021"
authors = ["Hisoka Labs"]
description = "WASM bindings for NOX mixnet Sphinx crypto (for browser/Node.js clients)"
license = "Apache-2.0"
repository = "https://github.com/hisoka-io/nox-sdk"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
# Enables the parallel PoW solver — NOT available in WASM (rayon incompatible)
# Only enable for native test builds.
parallel-pow = ["nox-crypto/rayon-pow"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = "1"
bincode = "1.3"
sha2 = "0.10"
hex = "0.4"
nox-crypto = { git = "https://github.com/hisoka-io/nox.git", default-features = false }
# getrandom must use the JS backend when targeting wasm32
getrandom = { version = "0.2", features = ["js"] }
thiserror = "1"
zeroize = { version = "1.8", features = ["derive"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-mutable-globals"]
